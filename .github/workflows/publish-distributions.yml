name: Publish to distributions

# Runs automatically when a GitHub release is published (i.e. a draft is made public).
# Prerequisite: a classic PAT (or fine-grained token) with write access to:
#   - confold/homebrew-confold
#   - confold/scoop-confold
#   - juanyque/winget-pkgs   (a fork of microsoft/winget-pkgs)
# Store it as the repository secret DIST_GITHUB_TOKEN.
on:
  release:
    types: [published]
  # Manual trigger — the reliable path. `release: published` events don't fire when the
  # release was created by Actions' GITHUB_TOKEN (anti-recursion) or re-published via the API,
  # so dispatch this directly: `gh workflow run "Publish to distributions" -f version=0.5.0`.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.5.0); defaults to the latest release"
        required: false

permissions:
  contents: read

jobs:
  # ── Homebrew tap (cask = macOS .dmg, formula = Linux .AppImage) ───────────────
  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Read from main, not the tag: the dist/ manifests are bumped (sha256 + version)
          # AFTER the build creates the release assets, so the tag's tree is stale.
          ref: main

      - name: Push cask and formula to homebrew-confold
        env:
          GH_TOKEN: ${{ secrets.DIST_GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName' | sed 's/^v//')
          fi

          # Update a file in a remote repo via the GitHub Contents API.
          # Works for both updates (sha required) and creates (no sha).
          update_file() {
            local repo="$1" remote_path="$2" local_path="$3" msg="$4"
            local sha
            sha=$(gh api "repos/${repo}/contents/${remote_path}" --jq '.sha' 2>/dev/null || true)
            local args=(
              --method PUT
              --field "message=${msg}"
              --field "content=$(base64 -w 0 < "$local_path")"
            )
            [[ -n "$sha" ]] && args+=(--field "sha=${sha}")
            gh api "repos/${repo}/contents/${remote_path}" "${args[@]}"
          }

          TAP="confold/homebrew-confold"
          update_file "$TAP" Casks/confold.rb   dist/brew/Casks/confold.rb   "confold ${VERSION}: update cask"
          update_file "$TAP" Formula/confold.rb dist/brew/Formula/confold.rb "confold ${VERSION}: update formula"
          update_file "$TAP" README.md          dist/brew/tap.README.md      "confold ${VERSION}: update README"

  # ── Scoop bucket ──────────────────────────────────────────────────────────────
  scoop:
    name: Update Scoop bucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Push manifest to scoop-confold
        env:
          GH_TOKEN: ${{ secrets.DIST_GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName' | sed 's/^v//')
          fi
          SHA=$(gh api repos/confold/scoop-confold/contents/bucket/confold.json --jq '.sha' 2>/dev/null || true)
          args=(
            --method PUT
            --field "message=confold ${VERSION}: update manifest"
            --field "content=$(base64 -w 0 < dist/scoop/bucket/confold.json)"
          )
          [[ -n "$SHA" ]] && args+=(--field "sha=${SHA}")
          gh api repos/confold/scoop-confold/contents/bucket/confold.json "${args[@]}"

          # README for the bucket repo's landing page (kept in sync from the main repo).
          RSHA=$(gh api repos/confold/scoop-confold/contents/README.md --jq '.sha' 2>/dev/null || true)
          rargs=(
            --method PUT
            --field "message=confold ${VERSION}: update README"
            --field "content=$(base64 -w 0 < dist/scoop/bucket.README.md)"
          )
          [[ -n "$RSHA" ]] && rargs+=(--field "sha=${RSHA}")
          gh api repos/confold/scoop-confold/contents/README.md "${rargs[@]}"

  # ── winget (PR to microsoft/winget-pkgs) ──────────────────────────────────────
  winget:
    name: Submit winget PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Create PR in juanyque/winget-pkgs fork
        env:
          GH_TOKEN: ${{ secrets.DIST_GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName' | sed 's/^v//')
          fi
          BRANCH="confold-${VERSION}"
          MANIFEST_DIR="manifests/c/Confold/Confold/${VERSION}"
          FORK="juanyque/winget-pkgs"
          UPSTREAM="microsoft/winget-pkgs"

          # Sync the fork's master with upstream before branching.
          UPSTREAM_SHA=$(gh api "repos/${UPSTREAM}/git/ref/heads/master" --jq '.object.sha')

          # Delete the branch if it already exists (idempotent re-runs).
          gh api "repos/${FORK}/git/refs/heads/${BRANCH}" \
            --method DELETE 2>/dev/null || true

          # Create a fresh branch from upstream master.
          gh api "repos/${FORK}/git/refs" \
            --method POST \
            --field "ref=refs/heads/${BRANCH}" \
            --field "sha=${UPSTREAM_SHA}"

          # Push each manifest file to the branch.
          for local_file in "dist/winget/${MANIFEST_DIR}"/*.yaml; do
            fname=$(basename "$local_file")
            gh api "repos/${FORK}/contents/${MANIFEST_DIR}/${fname}" \
              --method PUT \
              --field "message=New version: Confold.Confold version ${VERSION}" \
              --field "content=$(base64 -w 0 < "$local_file")" \
              --field "branch=${BRANCH}"
          done

          # Open the PR — skip if one already exists for this version.
          EXISTING=$(gh pr list --repo "$UPSTREAM" \
            --head "${FORK%/*}:${BRANCH}" --json number --jq '.[0].number' 2>/dev/null || true)
          if [[ -z "$EXISTING" ]]; then
            gh pr create \
              --repo "$UPSTREAM" \
              --head "${FORK%/*}:${BRANCH}" \
              --base master \
              --title "New version: Confold.Confold version ${VERSION}" \
              --body "Automated submission for Confold ${VERSION}. See https://github.com/confold/confold/releases/tag/v${VERSION}"
          else
            echo "PR #${EXISTING} already exists, skipping."
          fi
